<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Wader · Admin</title>
    <style>
      :root {
        --bg: #f8fafc;
        --fg: #0f172a;
        --muted: #64748b;
        --accent: #2563eb;
        --border: #e2e8f0;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        background: var(--bg);
        color: var(--fg);
      }
      header {
        padding: 1rem 2rem;
        background: white;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: space-between;
      }
      header h1 { font-size: 1.1rem; margin: 0; font-weight: 600; }
      header nav a {
        color: var(--muted);
        text-decoration: none;
        margin-left: 1rem;
        font-size: 0.9rem;
      }
      main { padding: 2rem; max-width: 800px; margin: 0 auto; }
      .placeholder {
        background: white;
        border: 1px dashed var(--border);
        border-radius: 8px;
        padding: 2rem;
        text-align: center;
        color: var(--muted);
      }
      .badge {
        display: inline-block;
        padding: 2px 8px;
        background: #fef3c7;
        color: #92400e;
        border-radius: 4px;
        font-size: 0.75rem;
        font-weight: 600;
        text-transform: uppercase;
      }
    </style>
  </head>
  <body>
    <header>
      <h1>Wader · Admin</h1>
      <nav>
        <span class="badge">F1 — Esqueleto</span>
        <a href="/">Recepção</a>
        <a href="/wizard">Wizard</a>
      </nav>
    </header>
    <main>
      <div class="placeholder">
        <h2>Painel Admin</h2>
        <p>Placeholder da Fase 1. Status do serviço, configurações de aparelhos e logs serão implementados em fases posteriores.</p>
      </div>
    </main>
  </body>
</html>
